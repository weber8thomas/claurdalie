name: Tag release

# Auto-creates a git tag + GitHub Release whenever main carries a new version.
#
# Tag pushes from the Claude Code web sandbox are blocked by its git mediator,
# so tagging is delegated to GitHub itself: on every push to main this reads the
# version from package.json and, if no matching `vX.Y.Z` tag exists yet, creates
# an annotated tag at the pushed commit plus a Release with generated notes. It
# is idempotent — pushes that don't change the version are a no-op — and runs on
# the runner's own repo-scoped GITHUB_TOKEN (not proxied), so no local machine
# or manual step is ever needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need existing tags to test idempotency
      - name: Create tag + release if the version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — nothing to do."
            exit 0
          fi
          echo "Creating release $tag at ${GITHUB_SHA}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes
